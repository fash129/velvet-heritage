    <main>
        <h1 class="contact-title">Contact Us</h1>
        <div class="contact-container">
            <div class="contact-image"> 
                <img src="phone2.jpg" alt="phone">
            </div> 
            <div class="contact-form">
                <form class="form-section">
                  <div id="msg"style="text-align:center; margin-bottom:15px; font-weight:bold; font-size:16px; min-height:24px;"></div>
                    <div>
                        <label for="name">Name</label>
                        <input type="text" id="name" name="Name" placeholder="Enter your name"                
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="Email" placeholder="Enter your email">
                    </div>
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="Phone" placeholder="Enter your phone number">
                    </div>
                    <div>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="10" placeholder="Enter your message"></textarea>
                    </div>
                    <div class="submit-btn-container">
                        <button type="button" onclick="validateContact(event)">Contact Us</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
